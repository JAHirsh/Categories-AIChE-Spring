<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIChE Spring Meeting — Process Safety Categories</title>

  <style>
    :root{
      --chs-blue:#005e82;
      --bg:#f5f5f5;
      --card:#ffffff;
      --border:#dddddd;
      --text:#1f1f1f;
      --muted:#666666;

      --yellow:#f6e58d;
      --green:#badc58;
      --blue:#7ed6df;
      --purple:#c7a7ff;

      --tile-bg:#ffffff;
      --tile-border:#cfcfcf;
      --tile-selected:#005e82;
      --tile-selected-text:#ffffff;
      --button-bg:#005e82;
      --button-text:#ffffff;
      --button-secondary:#e9eef2;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:16px;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);
    }

    h1{
      margin:0 0 8px 0;
      color:var(--chs-blue);
      font-size:clamp(1.5rem, 3vw, 2rem);
      line-height:1.2;
    }

    .sub{
      margin:0 0 18px 0;
      color:var(--muted);
      font-size:0.98rem;
      line-height:1.5;
    }

    .status{
      min-height:24px;
      margin-bottom:14px;
      font-size:0.98rem;
      color:var(--chs-blue);
      font-weight:700;
    }

    .mistakes{
      margin-bottom:14px;
      font-size:0.95rem;
      color:var(--muted);
    }

    .board{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      margin-bottom:16px;
    }

    .tile{
      width:100%;
      aspect-ratio:1 / 1;
      min-height:78px;
      border:2px solid var(--tile-border);
      border-radius:12px;
      background:var(--tile-bg);
      color:var(--text);
      font-weight:700;
      font-size:clamp(0.74rem, 1.7vw, 1rem);
      line-height:1.15;
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      cursor:pointer;
      user-select:none;
      transition:transform 0.08s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .tile:hover{
      transform:translateY(-1px);
    }

    .tile.selected{
      background:var(--tile-selected);
      color:var(--tile-selected-text);
      border-color:var(--tile-selected);
    }

    .tile.solved{
      cursor:default;
      color:#1f1f1f;
      border-color:transparent;
    }

    .solved-row{
      border-radius:12px;
      padding:14px 16px;
      margin-bottom:10px;
    }

    .solved-row h3{
      margin:0 0 6px 0;
      font-size:1rem;
    }

    .solved-row p{
      margin:0;
      font-size:0.95rem;
      line-height:1.45;
    }

    .yellow{ background:var(--yellow); }
    .green{ background:var(--green); }
    .blue{ background:var(--blue); }
    .purple{ background:var(--purple); }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:6px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:10px;
      padding:12px 16px;
      font-size:0.95rem;
      font-weight:700;
      cursor:pointer;
      transition:opacity 0.15s ease, transform 0.08s ease;
    }

    button:hover{
      opacity:0.95;
    }

    button:active{
      transform:translateY(1px);
    }

    .primary{
      background:var(--button-bg);
      color:var(--button-text);
    }

    .secondary{
      background:var(--button-secondary);
      color:var(--text);
      border:1px solid var(--border);
    }

    .footer-note{
      margin-top:16px;
      font-size:0.88rem;
      color:var(--muted);
      line-height:1.5;
    }

    @media (max-width: 640px){
      body{
        padding:10px;
      }

      .card{
        padding:14px;
        border-radius:12px;
      }

      .board{
        gap:8px;
      }

      .tile{
        min-height:70px;
        padding:6px;
        font-size:clamp(0.68rem, 3vw, 0.9rem);
        border-radius:10px;
      }

      button{
        flex:1 1 auto;
        padding:12px 14px;
      }
    }

    @media (max-width: 420px){
      .tile{
        min-height:64px;
        font-size:clamp(0.64rem, 3.3vw, 0.82rem);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>AIChE Spring Meeting — Process Safety Categories</h1>
      <p class="sub">
        Group the terms into four sets of four.
      </p>

      <div id="solved-container"></div>

      <div id="status" class="status"></div>
      <div id="mistakes" class="mistakes">Mistakes remaining: <span id="mistakes-count">4</span></div>

      <div id="board" class="board"></div>

      <div class="controls">
        <button class="secondary" id="shuffle-btn" type="button">Shuffle</button>
        <button class="secondary" id="deselect-btn" type="button">Deselect All</button>
        <button class="primary" id="submit-btn" type="button">Submit</button>
        <button class="secondary" id="reset-btn" type="button">Reset Game</button>
      </div>

      <div class="footer-note">
        Categories include Personal Protection, Incident Investigation Tools,
        Layers of Protection / Safeguards, and Process Safety Events / Consequences.
      </div>
    </div>
  </div>

  <script>
    const groups = [
      {
        name: "Personal Protection",
        colorClass: "yellow",
        terms: ["PPE", "Face Shield", "Respirator", "Chemical Suit"]
      },
      {
        name: "Incident Investigation Tools",
        colorClass: "green",
        terms: ["5 Whys", "Fault Tree", "Event Tree", "Root Cause"]
      },
      {
        name: "Layers of Protection / Safeguards",
        colorClass: "blue",
        terms: ["Relief Valve", "Interlock", "Alarm", "Containment"]
      },
      {
        name: "Process Safety Events / Consequences",
        colorClass: "purple",
        terms: ["Fire", "Explosion", "Toxic Release", "Overpressure"]
      }
    ];

    const solvedContainer = document.getElementById("solved-container");
    const board = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const mistakesCountEl = document.getElementById("mistakes-count");
    const shuffleBtn = document.getElementById("shuffle-btn");
    const deselectBtn = document.getElementById("deselect-btn");
    const submitBtn = document.getElementById("submit-btn");
    const resetBtn = document.getElementById("reset-btn");

    let allTiles = [];
    let selected = [];
    let solvedGroups = [];
    let mistakesRemaining = 4;
    let gameOver = false;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildTileData() {
      return groups.flatMap(group =>
        group.terms.map(term => ({
          term,
          groupName: group.name,
          colorClass: group.colorClass
        }))
      );
    }

    function renderSolvedGroups() {
      solvedContainer.innerHTML = "";

      solvedGroups.forEach(group => {
        const row = document.createElement("div");
        row.className = `solved-row ${group.colorClass}`;

        const title = document.createElement("h3");
        title.textContent = group.name;

        const terms = document.createElement("p");
        terms.textContent = group.terms.join(" • ");

        row.appendChild(title);
        row.appendChild(terms);
        solvedContainer.appendChild(row);
      });
    }

    function renderBoard() {
      board.innerHTML = "";

      const unsolvedTiles = allTiles.filter(tile =>
        !solvedGroups.some(group => group.name === tile.groupName)
      );

      unsolvedTiles.forEach(tile => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "tile";
        btn.textContent = tile.term;

        const isSelected = selected.includes(tile.term);
        if (isSelected) btn.classList.add("selected");

        btn.addEventListener("click", () => {
          if (gameOver) return;
          toggleSelect(tile.term);
        });

        board.appendChild(btn);
      });
    }

    function toggleSelect(term) {
      const alreadySelected = selected.includes(term);

      if (alreadySelected) {
        selected = selected.filter(t => t !== term);
      } else {
        if (selected.length >= 4) {
          setStatus("You can only select 4 terms at a time.");
          return;
        }
        selected.push(term);
      }

      setStatus("");
      renderBoard();
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function updateMistakes() {
      mistakesCountEl.textContent = mistakesRemaining;
    }

    function checkSelection() {
      if (selected.length !== 4) {
        setStatus("Select exactly 4 terms.");
        return;
      }

      const matchingGroup = groups.find(group =>
        group.terms.every(term => selected.includes(term))
      );

      if (matchingGroup) {
        solvedGroups.push(matchingGroup);
        selected = [];
        setStatus(`Correct: ${matchingGroup.name}`);

        renderSolvedGroups();
        renderBoard();

        if (solvedGroups.length === groups.length) {
          setStatus("You solved all 4 categories!");
          gameOver = true;
        }
      } else {
        mistakesRemaining -= 1;
        updateMistakes();

        if (mistakesRemaining <= 0) {
          gameOver = true;
          selected = [];
          revealAllGroups();
          setStatus("Game over. The full solution is shown above.");
        } else {
          setStatus("Not quite. Try again.");
          selected = [];
          renderBoard();
        }
      }
    }

    function revealAllGroups() {
      solvedGroups = [...groups];
      renderSolvedGroups();
      renderBoard();
    }

    function resetGame() {
      allTiles = shuffle(buildTileData());
      selected = [];
      solvedGroups = [];
      mistakesRemaining = 4;
      gameOver = false;

      solvedContainer.innerHTML = "";
      setStatus("");
      updateMistakes();
      renderBoard();
    }

    shuffleBtn.addEventListener("click", () => {
      if (gameOver) return;
      const unsolvedTiles = allTiles.filter(tile =>
        !solvedGroups.some(group => group.name === tile.groupName)
      );
      const solvedTiles = allTiles.filter(tile =>
        solvedGroups.some(group => group.name === tile.groupName)
      );
      allTiles = [...solvedTiles, ...shuffle(unsolvedTiles)];
      renderBoard();
      setStatus("");
    });

    deselectBtn.addEventListener("click", () => {
      if (gameOver) return;
      selected = [];
      renderBoard();
      setStatus("");
    });

    submitBtn.addEventListener("click", checkSelection);
    resetBtn.addEventListener("click", resetGame);

    resetGame();
  </script>
</body>
</html>
